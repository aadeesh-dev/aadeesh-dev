name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      # ----------------------------------------------------
      # Image 1: Base Profile Stats
      # ----------------------------------------------------
      - name: Base Stats
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories, metadata
          
      # ----------------------------------------------------
      # Image 2: Google PageSpeed Insights
      # ----------------------------------------------------
      - name: PageSpeed
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.pagespeed.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: "" # <-- This disables the base stats for this image
          plugin_pagespeed: yes
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
          plugin_pagespeed_url: https://hackboiler.vercel.app/
          plugin_pagespeed_detailed: yes

      # ----------------------------------------------------
      # Image 3: Full-Year Calendar (Isocalendar)
      # ----------------------------------------------------
      - name: Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: "" # <-- This disables the base stats for this image
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
